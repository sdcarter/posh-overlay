name: release-windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    env:
      CONFIGURATION: Release
      RUNTIME: win-x64
      FRAMEWORK: net10.0-windows10.0.19041.0
      APP_PROJECT: src/PrecisionDash.App/PrecisionDash.App.csproj
      DOMAIN_TESTS: tests/PrecisionDash.Domain.Unit/PrecisionDash.Domain.Unit.csproj
      INTEGRATION_TESTS: tests/PrecisionDash.Adapters.Integration/PrecisionDash.Adapters.Integration.csproj
      CONTRACT_TESTS: tests/PrecisionDash.Contracts/PrecisionDash.Contracts.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Resolve Windows SDK tools
        id: windows_sdk
        shell: pwsh
        run: |
          $kitsRoot = Join-Path "${env:ProgramFiles(x86)}" "Windows Kits\10\bin"
          if (-not (Test-Path $kitsRoot)) {
            throw "Windows SDK bin root not found: $kitsRoot"
          }

          $makeappxCandidates = Get-ChildItem -Path $kitsRoot -Filter makeappx.exe -Recurse -File |
            Where-Object { $_.FullName -match '\\x64\\' }
          $signtoolCandidates = Get-ChildItem -Path $kitsRoot -Filter signtool.exe -Recurse -File |
            Where-Object { $_.FullName -match '\\x64\\' }

          if ($makeappxCandidates.Count -eq 0) {
            throw "makeappx.exe not found under $kitsRoot"
          }
          if ($signtoolCandidates.Count -eq 0) {
            throw "signtool.exe not found under $kitsRoot"
          }

          $makeappx = $makeappxCandidates |
            Sort-Object { [version]($_.Directory.Parent.Name) } -Descending |
            Select-Object -First 1
          $signtool = $signtoolCandidates |
            Sort-Object { [version]($_.Directory.Parent.Name) } -Descending |
            Select-Object -First 1

          Write-Host "Using makeappx: $($makeappx.FullName)"
          Write-Host "Using signtool: $($signtool.FullName)"
          "makeappx=$($makeappx.FullName)" >> $env:GITHUB_OUTPUT
          "signtool=$($signtool.FullName)" >> $env:GITHUB_OUTPUT

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $semver = "${{ github.ref_name }}".TrimStart('v')
          } else {
            $semver = "0.0.${{ github.run_number }}"
          }
          # Windows version string requires 4 components (e.g. 1.2.3.0)
          $winver = "$semver.0"
          "version=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          "semver=$semver" >> $env:GITHUB_OUTPUT
          "winver=$winver" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ${{ env.APP_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.APP_PROJECT }} -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test domain
        run: dotnet test ${{ env.DOMAIN_TESTS }} -c ${{ env.CONFIGURATION }}

      - name: Test integration
        run: dotnet test ${{ env.INTEGRATION_TESTS }} -c ${{ env.CONFIGURATION }}

      - name: Test contracts
        run: dotnet test ${{ env.CONTRACT_TESTS }} -c ${{ env.CONFIGURATION }}

      - name: Publish win-x64 package
        shell: pwsh
        run: |
          dotnet publish ${{ env.APP_PROJECT }} `
            -c ${{ env.CONFIGURATION }} `
            -f ${{ env.FRAMEWORK }} `
            -r ${{ env.RUNTIME }} `
            -p:PublishAot=false `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:PublishTrimmed=false `
            -o artifacts/win-x64

      - name: Record payload size
        shell: pwsh
        run: |
          $payloadMB = [math]::Round((Get-Item "artifacts/win-x64/PrecisionDash.App.exe").Length / 1MB, 2)
          Write-Host "Payload size: $payloadMB MB"
          "payload_mb=$payloadMB" >> $env:GITHUB_OUTPUT
        id: payload_size

      - name: Patch Package.appxmanifest with release version
        shell: pwsh
        run: |
          $content = Get-Content packaging/Windows/Package.appxmanifest -Raw
          $content = $content -replace '(?<=<Identity[^>]*Version=")[^"]*', '${{ steps.version.outputs.winver }}'
          $content | Set-Content packaging/Windows/Package.appxmanifest

      - name: Create MSIX package
        id: msix
        shell: pwsh
        run: |
          $winver  = "${{ steps.version.outputs.winver }}"
          $semver  = "${{ steps.version.outputs.semver }}"
          $msixName = "PrecisionDash-$semver-win-x64.msix"
          New-Item -ItemType Directory -Force -Path artifacts/msix-layout | Out-Null
          Copy-Item -Recurse -Force artifacts/win-x64/* artifacts/msix-layout/
          Copy-Item packaging/Windows/Package.appxmanifest artifacts/msix-layout/
          $makeappx = "${{ steps.windows_sdk.outputs.makeappx }}"
          & $makeappx pack /d artifacts/msix-layout /p "artifacts/$msixName" /o /nv
          $msixMB = [math]::Round((Get-Item "artifacts/$msixName").Length / 1MB, 2)
          Write-Host "MSIX size: $msixMB MB"
          "msix_name=$msixName" >> $env:GITHUB_OUTPUT
          "msix_path=artifacts/$msixName" >> $env:GITHUB_OUTPUT
          "msix_mb=$msixMB" >> $env:GITHUB_OUTPUT

      - name: Sign MSIX
        shell: pwsh
        env:
          SIGNING_CERT_BASE64: ${{ secrets['SIGNING_CERT_BASE64'] }}
          SIGNING_CERT_PASSWORD: ${{ secrets['SIGNING_CERT_PASSWORD'] }}
        run: |
          $certPath = "artifacts/signing-temp.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:SIGNING_CERT_BASE64))
          $signtool = "${{ steps.windows_sdk.outputs.signtool }}"
          & $signtool sign /fd SHA256 /a /f $certPath /p $env:SIGNING_CERT_PASSWORD "${{ steps.msix.outputs.msix_path }}"
          Remove-Item $certPath

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          $msixPath = "${{ steps.msix.outputs.msix_path }}"
          $hash = (Get-FileHash $msixPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${{ steps.msix.outputs.msix_name }}" | Out-File "$msixPath.sha256" -Encoding ASCII -NoNewline
          Write-Host "SHA256: $hash"

      - name: Patch and emit App Installer manifest
        shell: pwsh
        run: |
          $winver  = "${{ steps.version.outputs.winver }}"
          $tag     = "${{ steps.version.outputs.version }}"
          $msixName = "${{ steps.msix.outputs.msix_name }}"
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/$tag"
          $content = Get-Content packaging/Windows/PrecisionDash.appinstaller -Raw
          $content = $content -replace '(?<=AppInstaller[^>]*Version=")[^"]*', $winver
          $content = $content -replace '(?<=AppInstaller[^>]*Uri=")[^"]*', "$baseUrl/PrecisionDash.appinstaller"
          $content = $content -replace '(?<=MainPackage[^>]*Version=")[^"]*', $winver
          $content = $content -replace '(?<=MainPackage[^>]*Uri=")[^"]*', "$baseUrl/$msixName"
          $content | Set-Content artifacts/PrecisionDash.appinstaller

      - name: Test application unit tests
        run: dotnet test tests/PrecisionDash.Application.Unit/PrecisionDash.Application.Unit.csproj -c ${{ env.CONFIGURATION }}

      - name: Create zip (legacy channel)
        id: archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $zipPath = "artifacts/PrecisionDash-${{ steps.version.outputs.semver }}-win-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path artifacts/win-x64/* -DestinationPath $zipPath
          "zipPath=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrecisionDash-${{ steps.version.outputs.semver }}-win-x64
          path: ${{ steps.archive.outputs.zipPath }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.archive.outputs.zipPath }}
            ${{ steps.msix.outputs.msix_path }}
            ${{ steps.msix.outputs.msix_path }}.sha256
            artifacts/PrecisionDash.appinstaller
          body: |
            ## PrecisionDash ${{ steps.version.outputs.semver }}

            ### Install
            Download and double-click `PrecisionDash.appinstaller` – Windows installs PrecisionDash and registers it in the Start Menu.

            ### Update
            Launch the installed app. It checks for newer releases automatically and offers to install now or defer.

            ### Artifact sizes
            - Payload: ${{ steps.payload_size.outputs.payload_mb }} MB
            - MSIX package: ${{ steps.msix.outputs.msix_mb }} MB
          generate_release_notes: false