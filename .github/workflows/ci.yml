name: ci

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore PrecisionDash.sln
      - name: Build
        run: dotnet build PrecisionDash.sln -c Release --no-restore
      - name: Test
        run: dotnet test PrecisionDash.sln -c Release --no-build